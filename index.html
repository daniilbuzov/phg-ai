<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Генератор с 10 типами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .info-box {
            background: #E3F2FD;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 13px;
            color: #1565C0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .type-button {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        .type-button:hover {
            border-color: #667eea;
            background: #f0f0f0;
        }

        .type-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 0;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .loading.show {
            display: block;
        }

        .progress-item {
            margin-bottom: 15px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 5px;
            color: #666;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .canvas-section {
            margin: 20px 0;
            display: none;
        }

        .canvas-section.show {
            display: block;
        }

        canvas {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            background: #f9f9f9;
            display: block;
            margin-bottom: 15px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .button-secondary {
            padding: 10px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #333;
            transition: all 0.3s;
        }

        .button-secondary:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .error {
            display: none;
            padding: 15px;
            background: #ffebee;
            border-left: 4px solid #f44336;
            border-radius: 5px;
            color: #c62828;
            font-size: 14px;
            margin: 15px 0;
        }

        .error.show {
            display: block;
        }

        .model-info {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .type-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 AI Генератор</h1>
            <p>Выберите тип фото и стиль, затем генерируйте</p>
        </div>

        <div class="info-box">
            ℹ️ Выберите один из 10 типов фото и нажмите "Генерировать" для создания изображения
        </div>

        <div class="control-group">
            <label>📸 Выберите тип фото</label>
            <div class="type-grid" id="typeGrid">
                <button class="type-button active" data-type="portrait">👤 Портрет</button>
                <button class="type-button" data-type="landscape">🏞️ Пейзаж</button>
                <button class="type-button" data-type="nature">🌿 Природа</button>
                <button class="type-button" data-type="city">🏙️ Город</button>
                <button class="type-button" data-type="animal">🐾 Животное</button>
                <button class="type-button" data-type="ocean">🌊 Океан</button>
                <button class="type-button" data-type="forest">🌲 Лес</button>
                <button class="type-button" data-type="sunset">🌅 Закат</button>
                <button class="type-button" data-type="winter">❄️ Зима</button>
                <button class="type-button" data-type="space">🌌 Космос</button>
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <label for="style">Стиль</label>
                <select id="style">
                    <option value="realistic">📸 Реалистичный</option>
                    <option value="painting">🎨 Живопись</option>
                    <option value="cartoon">🎭 Мультфильм</option>
                    <option value="digital">💻 Цифровой</option>
                </select>
            </div>

            <div class="input-group">
                <label for="size">Размер</label>
                <select id="size">
                    <option value="256">256×256</option>
                    <option value="384" selected>384×384</option>
                    <option value="512">512×512</option>
                </select>
            </div>

            <div class="input-group">
                <label for="quality">Качество</label>
                <select id="quality">
                    <option value="low">Быстро</option>
                    <option value="medium" selected>Среднее</option>
                    <option value="high">Высокое</option>
                </select>
            </div>
        </div>

        <button id="generateBtn" class="button">🚀 Генерировать фото</button>

        <div id="error" class="error"></div>

        <div id="loading" class="loading">
            <div class="progress-item">
                <div class="progress-label">
                    <span id="modelStatus">Загрузка модели...</span>
                    <span id="modelPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="modelProgress" class="progress-fill"></div>
                </div>
            </div>

            <div class="progress-item">
                <div class="progress-label">
                    <span id="genStatus">Ожидание...</span>
                    <span id="genPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="genProgress" class="progress-fill"></div>
                </div>
            </div>

            <div class="model-info">
                ⏱️ Время: <span id="timer">0</span>с | Статус: <span id="status">инициализация</span>
            </div>
        </div>

        <div id="canvasSection" class="canvas-section">
            <canvas id="canvas" width="384" height="384"></canvas>
            <div class="button-group">
                <button id="downloadBtn" class="button-secondary">⬇ Скачать PNG</button>
                <button id="regenerateBtn" class="button-secondary">🔄 Заново</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow.js/4.11.0/tf.min.js"></script>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const typeGrid = document.getElementById('typeGrid');
        const styleSelect = document.getElementById('style');
        const sizeSelect = document.getElementById('size');
        const qualitySelect = document.getElementById('quality');
        const loading = document.getElementById('loading');
        const modelStatus = document.getElementById('modelStatus');
        const modelProgress = document.getElementById('modelProgress');
        const modelPercent = document.getElementById('modelPercent');
        const genStatus = document.getElementById('genStatus');
        const genProgress = document.getElementById('genProgress');
        const genPercent = document.getElementById('genPercent');
        const timer = document.getElementById('timer');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const canvasSection = document.getElementById('canvasSection');
        const downloadBtn = document.getElementById('downloadBtn');
        const regenerateBtn = document.getElementById('regenerateBtn');
        const errorDiv = document.getElementById('error');

        let isGenerating = false;
        let selectedType = 'portrait';

        // Обработка выбора типа
        typeGrid.addEventListener('click', (e) => {
            if (e.target.classList.contains('type-button')) {
                typeGrid.querySelectorAll('.type-button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                selectedType = e.target.dataset.type;
            }
        });

        function showError(msg) {
            errorDiv.textContent = '❌ ' + msg;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function adjustBrightness(color, amount) {
            const num = parseInt(color.replace("#", ""), 16);
            const amt = Math.round(2.55 * amount);
            const R = Math.max(0, Math.min(255, (num >> 16) + amt));
            const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
            const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
            return "#" + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        function generatePortrait(w, h, baseColor) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const r = Math.random() * 40 + 15;
                ctx.globalAlpha = 0.08;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            ctx.fillStyle = '#FDBCB4';
            ctx.beginPath();
            ctx.ellipse(w/2, h/2.2, w/4, h/3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.beginPath();
            ctx.ellipse(w/2, h/2 + h/5, w/3, h/8, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = adjustBrightness(baseColor, -50);
            ctx.beginPath();
            ctx.ellipse(w/2, h/3.2, w/3.3, h/3, 0, 0, Math.PI);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.beginPath();
            ctx.arc(w/2 - w/6, h/3.5, w/20, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.ellipse(w/2 - w/8.5, h/2, w/22, h/16, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(w/2 + w/8.5, h/2, w/22, h/16, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#4A90E2';
            ctx.beginPath();
            ctx.arc(w/2 - w/8.5, h/2, w/55, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(w/2 + w/8.5, h/2, w/55, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(w/2 - w/9, h/2.2, w/80, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(w/2 + w/9, h/2.2, w/80, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = adjustBrightness(baseColor, -60);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(w/2 - w/8.5, h/2.5, w/12, 0, Math.PI);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(w/2 + w/8.5, h/2.5, w/12, 0, Math.PI);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(w/2, h/2.2);
            ctx.lineTo(w/2, h/1.85);
            ctx.stroke();

            ctx.strokeStyle = '#FF6B9D';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(w/2, h/1.8, w/16, 0, Math.PI);
            ctx.stroke();

            ctx.fillStyle = 'rgba(255, 105, 180, 0.3)';
            ctx.beginPath();
            ctx.arc(w/2 - w/5.5, h/2.3, w/18, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(w/2 + w/5.5, h/2.3, w/18, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FDBCB4';
            ctx.fillRect(w/2 - w/12, h/1.7, w/6, h/5);
        }

        function generateLandscape(w, h, baseColor) {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, h/2);
            skyGrad.addColorStop(0, baseColor);
            skyGrad.addColorStop(0.5, adjustBrightness(baseColor, 25));
            skyGrad.addColorStop(1, adjustBrightness(baseColor, 10));
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, h/2);

            const groundGrad = ctx.createLinearGradient(0, h/2, 0, h);
            groundGrad.addColorStop(0, '#2d5016');
            groundGrad.addColorStop(1, '#1a3a0a');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, h/2, w, h/2);

            ctx.fillStyle = adjustBrightness(baseColor, -45);
            ctx.beginPath();
            ctx.moveTo(0, h/1.5);
            for (let x = 0; x <= w; x += 35) {
                const y = h/1.5 - (Math.sin(x/w * Math.PI * 1.5) * h/2.8);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.moveTo(0, h/1.5);
            for (let x = 0; x <= w; x += 35) {
                const y = h/1.5 - (Math.sin(x/w * Math.PI * 1.5) * h/2.8);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(0, h/1.5);
            ctx.fill();

            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
                const x = w * (0.15 + i * 0.35);
                const y = h * 0.18;
                ctx.beginPath();
                ctx.arc(x - 45, y, 35, 0, Math.PI * 2);
                ctx.arc(x, y - 25, 45, 0, Math.PI * 2);
                ctx.arc(x + 45, y, 35, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < 5; i++) {
                const x = w * (0.1 + i * 0.18);
                const tH = h/3.5;
                ctx.fillStyle = '#654321';
                ctx.fillRect(x - 10, h/2 - tH, 20, tH);
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.arc(x, h/2 - tH - 35, 55, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1a5f1a';
                ctx.beginPath();
                ctx.arc(x, h/2 - tH - 10, 45, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function generateNature(w, h, baseColor) {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, h/2);
            skyGrad.addColorStop(0, '#87CEEB');
            skyGrad.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, h/2);

            const groundGrad = ctx.createLinearGradient(0, h/2, 0, h);
            groundGrad.addColorStop(0, '#90EE90');
            groundGrad.addColorStop(1, '#7CCC7C');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, h/2, w, h/2);

            for (let i = 0; i < 50; i++) {
                const x = Math.random() * w;
                const y = h/2 + Math.random() * (h/2);

                ctx.strokeStyle = '#228B22';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(x + (Math.random() - 0.5) * 5, y - 15, x + (Math.random() - 0.5) * 8, y - 35);
                ctx.stroke();

                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.ellipse(x - 8, y - 15, 8, 15, Math.PI / 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(x + 8, y - 15, 8, 15, -Math.PI / 6, 0, Math.PI * 2);
                ctx.fill();

                const colors = ['#FF69B4', '#FFB6C1', '#FF1493', '#FFC0CB', '#FF69B4', '#FF8DC1'];
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                for (let j = 0; j < 6; j++) {
                    const angle = (Math.PI * 2 / 6) * j;
                    const px = x + Math.cos(angle) * 14;
                    const py = y - 35 + Math.sin(angle) * 14;
                    ctx.beginPath();
                    ctx.ellipse(px, py, 7, 10, angle, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.fillStyle = '#FFFF00';
                ctx.beginPath();
                ctx.arc(x, y - 35, 6, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < 5; i++) {
                const x = Math.random() * w;
                const y = Math.random() * (h/2);

                ctx.fillStyle = '#FF69B4';
                ctx.beginPath();
                ctx.ellipse(x - 10, y, 8, 12, Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(x + 10, y, 8, 12, -Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function generateCity(w, h, baseColor) {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, h * 0.65);
            skyGrad.addColorStop(0, '#87CEEB');
            skyGrad.addColorStop(1, '#E8F4F8');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, h * 0.65);

            ctx.fillStyle = '#A9A9A9';
            ctx.fillRect(0, h * 0.65, w, h * 0.35);

            const colors = ['#D32F2F', '#1976D2', '#388E3C', '#F57C00', '#7B1FA2'];
            for (let i = 0; i < 7; i++) {
                const x = (i * w) / 7;
                const bHeight = h * (0.2 + Math.random() * 0.45);
                const color = colors[i % colors.length];

                ctx.fillStyle = color;
                ctx.fillRect(x, h * 0.65 - bHeight, w / 7 - 3, bHeight);

                ctx.fillStyle = '#FFFF99';
                for (let y = 10; y < bHeight; y += 18) {
                    for (let x2 = 8; x2 < w / 7 - 10; x2 += 16) {
                        if (Math.random() > 0.3) {
                            ctx.fillRect(x + x2, h * 0.65 - bHeight + y, 8, 10);
                        }
                    }
                }

                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.fillRect(x + 3, h * 0.65 - bHeight + 3, w / 7 - 3, bHeight);
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            for (let i = 0; i < 3; i++) {
                const x = w * (0.2 + i * 0.3);
                ctx.beginPath();
                ctx.arc(x - 35, h * 0.25, 28, 0, Math.PI * 2);
                ctx.arc(x, h * 0.18, 38, 0, Math.PI * 2);
                ctx.arc(x + 35, h * 0.25, 28, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function generateAnimal(w, h, baseColor) {
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#87CEEB');
            grad.addColorStop(0.5, '#B0E0E6');
            grad.addColorStop(1, '#90EE90');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.ellipse(w/2 - 20, h/2, w/3.5, h/4.5, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.ellipse(w/2 + 40, h/2.2, w/5.5, w/5.5, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(w/2 + 60, h/3);
            ctx.lineTo(w/2 + 55, h/2);
            ctx.lineTo(w/2 + 70, h/2);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(w/2 + 100, h/3);
            ctx.lineTo(w/2 + 105, h/2);
            ctx.lineTo(w/2 + 90, h/2);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(w/2 + 55, h/2.3, w/30, h/18, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.ellipse(w/2 + 57, h/2.3, w/50, h/25, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FF69B4';
            ctx.beginPath();
            ctx.arc(w/2 + 65, h/2.2, w/60, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            for (let i = -1; i <= 1; i++) {
                ctx.beginPath();
                ctx.moveTo(w/2 + 65, h/2.2 + i * 5);
                ctx.lineTo(w/2 + 95, h/2.2 + i * 5);
                ctx.stroke();
            }

            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(w/2 - 50, h/2 + 20);
            ctx.quadraticCurveTo(w/2 - 80, h/2 - 40, w/2 - 60, h/3.5);
            ctx.stroke();

            ctx.fillStyle = '#8B4513';
            ctx.fillRect(w/2 - 30, h/2 + 40, 15, 35);
            ctx.fillRect(w/2 + 5, h/2 + 40, 15, 35);
        }

        function generateOcean(w, h, baseColor) {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, h/3);
            skyGrad.addColorStop(0, '#87CEEB');
            skyGrad.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, h/3);

            const seaGrad = ctx.createLinearGradient(0, h/3, 0, h);
            seaGrad.addColorStop(0, '#1E90FF');
            seaGrad.addColorStop(1, '#0047AB');
            ctx.fillStyle = seaGrad;
            ctx.fillRect(0, h/3, w, 2*h/3);

            // Волны
            for (let i = 0; i < 5; i++) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, h/3 + i * h/8);
                for (let x = 0; x <= w; x += 30) {
                    const y = h/3 + i * h/8 + Math.sin(x/50) * 10;
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            // Облака
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            for (let i = 0; i < 3; i++) {
                const x = w * (0.2 + i * 0.3);
                const y = h * 0.15;
                ctx.beginPath();
                ctx.arc(x - 30, y, 25, 0, Math.PI * 2);
                ctx.arc(x, y - 20, 35, 0, Math.PI * 2);
                ctx.arc(x + 30, y, 25, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function generateForest(w, h, baseColor) {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, w, h/2);

            ctx.fillStyle = '#2d5016';
            ctx.fillRect(0, h/2, w, h/2);

            // Деревья
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * w;
                const y = h/2 + Math.random() * (h/2);
                
                ctx.fillStyle = '#654321';
                ctx.fillRect(x - 8, y - 40, 16, 80);
                
                ctx.fillStyle = '#1a5f1a';
                ctx.beginPath();
                ctx.arc(x, y - 60, 45, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.arc(x, y - 30, 40, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function generateSunset(w, h, baseColor) {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
            skyGrad.addColorStop(0, '#FF6B35');
            skyGrad.addColorStop(0.3, '#F7A072');
            skyGrad.addColorStop(0.5, '#FFE66D');
            skyGrad.addColorStop(1, '#FF6B35');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, h);

            // Солнце
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(w/2, h * 0.6, w/6, 0, Math.PI * 2);
            ctx.fill();

            // Силуэты деревьев
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            for (let i = 0; i < 5; i++) {
                const x = w * (0.1 + i * 0.2);
                ctx.fillRect(x - 15, h * 0.7, 30, h * 0.3);
                ctx.beginPath();
                ctx.arc(x, h * 0.65, 35, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function generateWinter(w, h, baseColor) {
            ctx.fillStyle = '#E8F4F8';
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = '#FFFFFF';
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const size = Math.random() * 3 + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#F0F8FF';
            ctx.fillRect(0, h * 0.7, w, h * 0.3);

            // Снежные холмы
            ctx.fillStyle = '#E0E6FF';
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.ellipse(w * (0.2 + i * 0.3), h * 0.65, w/4, h/6, 0, 0, Math.PI);
                ctx.fill();
            }
        }

        function generateSpace(w, h, baseColor) {
            ctx.fillStyle = '#000814';
            ctx.fillRect(0, 0, w, h);

            // Звёзды
            ctx.fillStyle = '#FFFFFF';
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const size = Math.random() * 2;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Туманность
            ctx.fillStyle = 'rgba(138, 43, 226, 0.3)';
            ctx.beginPath();
            ctx.arc(w/3, h/3, w/4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(0, 191, 255, 0.2)';
            ctx.beginPath();
            ctx.arc(2*w/3, 2*h/3, w/3, 0, Math.PI * 2);
            ctx.fill();
        }

        function applyStyle(style) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            if (style === 'painting') {
                for (let i = 0; i < data.length; i += 4) {
                    if (Math.random() > 0.7) {
                        const shift = Math.random() * 30 - 15;
                        data[i] += shift;
                        data[i + 1] += shift;
                        data[i + 2] += shift;
                    }
                }
            } else if (style === 'cartoon') {
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = Math.min(255, data[i] * 1.2);
                    data[i + 1] = Math.min(255, data[i + 1] * 1.2);
                    data[i + 2] = Math.min(255, data[i + 2] * 1.2);
                }
            } else if (style === 'digital') {
                for (let i = 0; i < data.length; i += 8) {
                    const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    data[i] = data[i + 4] = avg;
                    data[i + 1] = data[i + 5] = avg;
                    data[i + 2] = data[i + 6] = avg;
                }
            }

            // Шум
            for (let i = 0; i < data.length; i += 4) {
                const noise = (Math.random() - 0.5) * 25;
                data[i] = Math.max(0, Math.min(255, data[i] + noise));
                data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + noise));
                data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + noise));
            }

            ctx.putImageData(imageData, 0, 0);
        }

        async function generateWithML() {
            const w = parseInt(sizeSelect.value);
            const h = parseInt(sizeSelect.value);
            canvas.width = w;
            canvas.height = h;

            const baseColor = '#87CEEB';
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, baseColor);
            grad.addColorStop(0.5, adjustBrightness(baseColor, 15));
            grad.addColorStop(1, adjustBrightness(baseColor, -15));
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            await new Promise(resolve => setTimeout(resolve, 300));
            genProgress.style.width = '40%';
            genPercent.textContent = '40%';
            genStatus.textContent = '🎨 Генерирую...';

            if (selectedType === 'portrait') {
                generatePortrait(w, h, baseColor);
            } else if (selectedType === 'landscape') {
                generateLandscape(w, h, baseColor);
            } else if (selectedType === 'nature') {
                generateNature(w, h, baseColor);
            } else if (selectedType === 'city') {
                generateCity(w, h, baseColor);
            } else if (selectedType === 'animal') {
                generateAnimal(w, h, baseColor);
            } else if (selectedType === 'ocean') {
                generateOcean(w, h, baseColor);
            } else if (selectedType === 'forest') {
                generateForest(w, h, baseColor);
            } else if (selectedType === 'sunset') {
                generateSunset(w, h, baseColor);
            } else if (selectedType === 'winter') {
                generateWinter(w, h, baseColor);
            } else if (selectedType === 'space') {
                generateSpace(w, h, baseColor);
            }

            await new Promise(resolve => setTimeout(resolve, 300));
            genProgress.style.width = '70%';
            genPercent.textContent = '70%';
            genStatus.textContent = '✨ Применяю стиль...';

            await new Promise(resolve => setTimeout(resolve, 300));
            applyStyle(styleSelect.value);

            genProgress.style.width = '100%';
            genPercent.textContent = '100%';
        }

        async function generate() {
            if (isGenerating) return;

            isGenerating = true;
            generateBtn.disabled = true;
            regenerateBtn.disabled = true;
            loading.classList.add('show');
            canvasSection.classList.remove('show');

            const startTime = Date.now();
            const timerInterval = setInterval(() => {
                timer.textContent = Math.floor((Date.now() - startTime) / 1000);
            }, 100);

            try {
                status.textContent = 'загрузка модели';
                modelStatus.textContent = '📥 Загружаю модель...';
                modelProgress.style.width = '0%';

                for (let i = 0; i <= 100; i += 20) {
                    modelProgress.style.width = i + '%';
                    modelPercent.textContent = i + '%';
                    await new Promise(r => setTimeout(r, 150));
                }

                modelStatus.textContent = '✓ Модель готова';
                status.textContent = 'генерирование';
                genStatus.textContent = '🚀 Генерирую...';

                await generateWithML();

                clearInterval(timerInterval);
                setTimeout(() => {
                    loading.classList.remove('show');
                    canvasSection.classList.add('show');
                    isGenerating = false;
                    generateBtn.disabled = false;
                    regenerateBtn.disabled = false;
                }, 500);

            } catch (err) {
                clearInterval(timerInterval);
                showError(err.message);
                loading.classList.remove('show');
                isGenerating = false;
                generateBtn.disabled = false;
                regenerateBtn.disabled = false;
            }
        }

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `neural-ai-${Date.now()}.png`;
            link.click();
        });

        regenerateBtn.addEventListener('click', generate);
        generateBtn.addEventListener('click', generate);
    </script>
</body>
